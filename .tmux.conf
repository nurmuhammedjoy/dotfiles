# prefix
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

# core
set -g default-terminal "screen-256color"
set -g history-limit 5000
set -g escape-time 10
set -g repeat-time 300
set -g focus-events on
set -g mouse on

# numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# status bar
set -g status-position top
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1d2021,fg=#ebdbb2"

set -g status-left-length 20
set -g status-left "#[bg=#d79921,fg=#1d2021,bold] #S #[bg=#1d2021,fg=#d79921]"

set -g status-right-length 30
set -g status-right "#[fg=#a89984]%a %d %b#[fg=#504945] │ #[fg=#fabd2f]%H:%M "

# window tabs
setw -g window-status-format         " #[fg=#928374]#I#[fg=#504945]:#[fg=#a89984]#W "
setw -g window-status-current-format "#[bg=#3c3836,fg=#fabd2f,bold] #I#[fg=#665c54]:#[fg=#ebdbb2]#W#[fg=#fabd2f]#{?window_zoomed_flag, Z,} #[bg=#1d2021,fg=#3c3836]"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style        "fg=#3c3836"
set -g pane-active-border-style "fg=#d79921"

# messages
set -g message-style        "bg=#3c3836,fg=#fabd2f,bold"
set -g message-command-style "bg=#3c3836,fg=#83a598"

# copy mode
setw -g mode-style "bg=#504945,fg=#fabd2f"

# bindings
bind r source-file ~/.tmux.conf \; display "config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

bind -r n next-window
bind -r p previous-window

bind x kill-pane
bind X kill-window

bind c new-window -c "#{pane_current_path}"
bind z resize-pane -Z

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel


